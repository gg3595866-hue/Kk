<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1xBet Game Proxy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #0a0e14;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    .header {
      background: #111827;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1f2937;
    }

    .logo {
      font-size: 18px;
      font-weight: 900;
      font-style: italic;
      color: #f5a623;
      letter-spacing: -0.5px;
    }

    .logo span { color: #fff; }

    .badge {
      margin-left: auto;
      background: #16a34a;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 0.5px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1f2937;
    }

    .section:last-child { border-bottom: none; }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .status-row .label { color: #d1d5db; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #16a34a;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 4px #16a34a;
    }

    .dot.off { background: #6b7280; box-shadow: none; }

    .hint {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.5;
    }

    .url-input {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #fff;
      padding: 7px 10px;
      font-size: 12px;
      outline: none;
      margin-top: 6px;
    }

    .url-input:focus { border-color: #f5a623; }

    .save-btn {
      margin-top: 8px;
      width: 100%;
      background: #f5a623;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 7px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .save-btn:active { opacity: 0.85; }

    .saved-msg {
      text-align: center;
      color: #16a34a;
      font-size: 11px;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">1x<span>BET</span></div>
    <div class="badge">ACTIVE</div>
  </div>

  <div class="section">
    <div class="section-title">Status</div>
    <div class="status-row">
      <span class="label"><span class="dot" id="dot-frame"></span>Frame unlock</span>
      <span style="color:#16a34a;font-weight:700">ON</span>
    </div>
    <div class="status-row">
      <span class="label"><span class="dot" id="dot-proxy"></span>Proxy redirect</span>
      <span style="color:#16a34a;font-weight:700">ON</span>
    </div>
    <div class="status-row">
      <span class="label"><span class="dot" id="dot-cdn"></span>CDN images</span>
      <span style="color:#16a34a;font-weight:700">ON</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">App URL</div>
    <p class="hint">Paste your Replit app URL so the extension knows which page to activate on.</p>
    <input id="app-url" class="url-input" type="url" placeholder="https://your-replit-url.repl.co" />
    <button class="save-btn" id="save-btn">Save</button>
    <div class="saved-msg" id="saved-msg">✓ Saved</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
